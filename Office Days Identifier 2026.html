    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(11, 18, 32, 0.72);
      z-index: 0;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 22px;
      margin: 0;
      color: var(--accent);
      font-weight: 800;
    }

    .meta {
      font-size: 13px;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .btn {
      padding: 8px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.20);
      color: var(--fg);
      cursor: pointer;
      user-select: none;
    }
    .btn:hover {
      background: rgba(255,255,255,0.14);
    }

    /* ---- Custom group dropdown (black text options) ---- */
    .groupbox {
      position: relative;
      display: inline-block;
    }

    .gbtn {

      const h = HOLIDAYS[iso];
      const approved = !!h.approved;
      td.classList.add(approved ? "holiday-approved" : "holiday-pending");
      td.title = `${h.name} — ${approved ? "Approved" : "Not approved"}`;
      return;
    }

    const officeDates = new Set(OFFICE_BY_GROUP[currentGroup] || []);
    if (officeDates.has(iso)) {
      td.classList.add("office");
      const c = GROUP_COLORS[currentGroup] || "#1E88E5";
      td.style.setProperty("--office-color", c);
      td.title = `Office day — Group ${currentGroup}`;
    }
  }

  function renderMonth() {
    monthTitle.textContent = `${MONTH_NAMES[viewMonth-1]} ${viewYear}`;
    rangeHint.textContent = "";

    const first = new Date(viewYear, viewMonth - 1, 1);
    const firstDow = monIndex(first.getDay());
    const startDate = new Date(viewYear, viewMonth - 1, 1 - firstDow);

    calBody.innerHTML = "";
    for (let r = 0; r < 6; r++) {
      const tr = document.createElement("tr");
      for (let c = 0; c < 7; c++) {
        const idx = r * 7 + c;
        const d = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate() + idx);

        const y = d.getFullYear();
        const m = d.getMonth() + 1;
        const dd = d.getDate();
        const iso = isoFromYMD(y, m, dd);

        const inMonth = (m === viewMonth);

        const td = document.createElement("td");
        td.setAttribute("data-date", iso);

        const dayDiv = document.createElement("div");
        dayDiv.className = "day";
        dayDiv.textContent = dd;
        td.appendChild(dayDiv);

        applyCellClasses(td, iso, inMonth, c);

        td.addEventListener("click", () => {
          selectedISO = iso;
          const p = parseISO(iso);
          viewYear = p.y;
          viewMonth = p.m;
          updateSelectedText();
          renderMonth();
        });

        tr.appendChild(td);
      }
      calBody.appendChild(tr);
    }

    updateSelectedText();
  }

  function updateSelectedText() {
    const p = parseISO(selectedISO);
    selText.textContent = `Selected: ${pad2(p.d)}.${pad2(p.m)}.${p.y}  |  Group: ${currentGroup}`;
  }

  prevBtn.addEventListener("click", () => {
    viewMonth -= 1;
    if (viewMonth < 1) {
      viewMonth = 12;
      viewYear -= 1;
    }
    renderMonth();
  });

  nextBtn.addEventListener("click", () => {
    viewMonth += 1;
    if (viewMonth > 12) {
      viewMonth = 1;
      viewYear += 1;
    }
    renderMonth();
  });

  todayBtn.addEventListener("click", () => {
    selectedISO = TODAY_ISO;
    const p = parseISO(TODAY_ISO);
    viewYear = p.y;
    viewMonth = p.m;
    renderMonth();
  });

  setGroupUI(currentGroup);
  todayBtn.click();
</script>

</body>
</html>
